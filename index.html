<head>
<meta charset="UTF-8">

<title>Calcolo Prezzo di Listino</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
}
.box {
  max-width: 380px;
  margin: 30px auto;
  background: #ffffff;
  padding: 20px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
img {
  max-width: 160px;
  width: 100%;
  height: auto;
  margin-bottom: 15px;
}
h2 {
  margin: 10px 0 20px;
  font-size: 20px;
}
label {
  display: block;
  margin-top: 12px;
}
input {
  width: 80px;
  padding: 6px;
  text-align: center;
}
select {
 width: 140px;
 padding: 6px;
 text-align: center;
 }

#densita {
  width: 60px;
  min-width: 60px;
  max-width: 60px;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #6fbf4a;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
.result {
  margin-top: 20px;
  font-size: 17px;
  font-weight: bold;
}
.note {
  margin-top: 10px;
  font-size: 13px;
  color: #555;
}

.price-box{background:#f4fdf0;padding:14px;border:2px solid #5fbf4a;border-radius:10px;font-size:17px;font-weight:700;color:#000;margin-top:18px;}

button{width:100%;font-size:16px;}
.box{padding-bottom:30px;}

label{color:#444;font-weight:500;font-size:13px;}
button{font-weight:700;}
#densita{font-weight:600;color:#222;}

.densita-label{color:#2a3648;font-weight:600;}
</style>

  function clampToAllowed(id, allowedValues) {
    let v = Math.floor(Number(document.getElementById(id).value));
    if (Number.isNaN(v)) v = allowedValues[0];

    if (!allowedValues.includes(v)) {
      let closest = allowedValues[0];
      let best = Math.abs(v - closest);
      for (const a of allowedValues) {
        const d = Math.abs(v - a);
